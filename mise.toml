# Tools installed via mise (https://mise.jdx.dev/).
#
# Setup:
#   mise install        # install all tools listed below
#   mise exec -- <cmd>  # run with mise PATH
#
# When direnv + mise activate hook is configured, `cd` into this directory
# is enough — the tools become available on PATH automatically.
#
# CI tools use the aqua/github backends (prebuilt release binaries) instead of
# the cargo backend (source build) so that GitHub Actions jobs can run them
# without a Rust toolchain. See .github/workflows/ci.yml.

[tools]
# Local GitHub Actions runner used by `scripts/verify-ci.sh` to validate
# .github/workflows/ci.yml before pushing.
#
# Pinned to 0.17.0 because 0.18.0–0.22.1 ship a JS syntax error in the
# compiled dist file ("Missing } in template expression") that aborts on
# startup. Upstream issue: revisit when a newer npm release is available.
"npm:@mizchi/actrun" = "0.17.0"

# Cargo CLI tools — prebuilt binaries (no Rust toolchain required).
"aqua:EmbarkStudios/cargo-deny" = "0.19.9"
"aqua:nextest-rs/nextest/cargo-nextest" = "0.9.138"
"aqua:taiki-e/cargo-llvm-cov" = "0.8.7"                           # coverage (lcov.info) via llvm source-based
"github:bnjbvr/cargo-machete" = "0.9.2"                           # unused-dependency detection
"github:CycloneDX/cyclonedx-rust-cargo" = "cargo-cyclonedx-0.5.9" # SBOM (CycloneDX) generation

# Formatters / linters — prebuilt binaries (aqua).
"aqua:tamasfe/taplo" = "0.10.0"  # TOML formatter / linter
"aqua:crate-ci/typos" = "1.47.2"

# Rust-only tool (source build); used locally for pre-commit hooks, not in CI.
"cargo:prek" = "0.4.5"

# cargo-mutants: source build (cargo backend) instead of the github prebuilt
# binary. The upstream prebuilt release links against GLIBC 2.39, which fails to
# start on older hosts (e.g. Ubuntu 22.04 / GLIBC 2.35). Building from source
# matches the local toolchain. CI installs the github prebuilt directly via
# `install_args` in .github/workflows/mutants.yml, so it is unaffected.
"cargo:cargo-mutants" = "27.1.0" # mutation testing (run on demand)

# GitHub Actions security & linting (aqua backend; run in the actions-security CI job).
"aqua:rhysd/actionlint" = "1.7.12"       # workflow static linter
"aqua:suzuki-shunsuke/ghalint" = "1.5.6" # GitHub Actions policy linter
"aqua:suzuki-shunsuke/pinact" = "4.1.0"
"aqua:zizmorcore/zizmor" = "1.26.1"
"aqua:google/yamlfmt" = "0.21.0"         # YAML formatter / linter
