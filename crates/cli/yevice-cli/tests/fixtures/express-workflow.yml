AWSTemplateFormatVersion: "2010-09-09"
Description: |
  High-frequency Express Step Functions workflow.
  - EventWorkflow: Express state machine for high-throughput event processing
  - HandlerFunction: Lambda handler invoked by workflow steps
  - HandlerLogs: CloudWatch Logs for handler function

Resources:
  EventWorkflow:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      Type: EXPRESS

  HandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      MemorySize: 128
      Timeout: 5
      Runtime: python3.11

  HandlerLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 7
