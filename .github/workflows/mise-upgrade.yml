name: mise upgrade

on:
  schedule:
    - cron: "0 15 1 * *" # 1st of each month, 15:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  upgrade:
    name: Bump mise tools
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      - name: Bump tool versions (excluding pinned actrun)
        run: |
          # Snapshot the intentionally-pinned actrun line, bump everything,
          # then restore actrun (pinned to 0.17.0 due to an upstream JS bug).
          actrun_line=$(grep '@mizchi/actrun' mise.toml)
          mise upgrade --bump
          # Restore the pinned actrun version
          sed -i "s|^\"npm:@mizchi/actrun\".*|${actrun_line}|" mise.toml
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          title: "chore(deps): bump mise-managed tools"
          commit-message: "chore(deps): mise upgrade --bump"
          branch: chore/mise-upgrade
          delete-branch: true
          body: |
            Automated monthly bump of mise-managed tools via `mise upgrade --bump`.

            `@mizchi/actrun` is intentionally excluded (pinned to 0.17.0).
          labels: dependencies
