# yaml-language-server: $schema=https://raw.githubusercontent.com/suzuki-shunsuke/pinact/refs/heads/main/json-schema/pinact.json
# pinact - https://github.com/suzuki-shunsuke/pinact
version: 3

# dtolnay/rust-toolchain uses moving branch tags (stable, 1.88) instead of
# semver release tags, so pinact cannot attach a verifiable `# vX.Y.Z` comment.
# The action is still SHA-pinned in the workflows; we only skip pinact's
# version-comment verification for it.
rules:
  - ignore: true
    conditions:
      - expr: |
          ActionName == "dtolnay/rust-toolchain"
